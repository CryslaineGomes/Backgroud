<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neural Background</title>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
background:#eef6ff;
}

/* fundo */

#tsparticles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* exemplo de conteúdo */

.login{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

background:rgba(255,255,255,0.35);
backdrop-filter:blur(10px);

padding:40px;
border-radius:20px;

box-shadow:0 10px 40px rgba(0,0,0,0.15);

width:320px;
text-align:center;

}

</style>

</head>

<body>

<div id="tsparticles"></div>

<div class="login">
<h2>Login</h2>
</div>

<script>

tsParticles.load("tsparticles", {

fpsLimit: 60,

particles: {

number: {
value: 80,
density: {
enable: true,
area: 900
}
},

color: {
value: "#3aa3ff"
},

links: {
enable: true,
distance: 180,
color: "#3aa3ff",
opacity: 0.4,
width: 1
},

move: {
enable: true,
speed: 0.5,
direction: "none",
random: true,
straight: false,

outModes: {
default: "bounce"
}
},

size: {
value: 2
},

opacity: {
value: 0.6
}

},

interactivity: {

events: {
onHover: {
enable: true,
mode: "repulse"
}
},

modes: {

repulse: {
distance: 130,
duration: 1.5
}

}

},

detectRetina: true

});

</script>

</body>
</html>
