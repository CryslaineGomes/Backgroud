<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>X Point Login</title>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(120deg,#eef6ff,#ffffff);
}

/* fundo */

#tsparticles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* login */

.login-container{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

width:360px;
padding:40px;

border-radius:20px;

background:rgba(255,255,255,0.35);
backdrop-filter:blur(12px);

box-shadow:0 15px 40px rgba(0,0,0,0.15);

text-align:center;

}

/* titulo */

.login-container h1{

font-size:32px;
margin-bottom:30px;
color:#2f8cff;

}

/* inputs */

.input-group{
margin-bottom:18px;
}

.input-group input{

width:100%;
padding:12px;

border-radius:10px;
border:1px solid rgba(0,0,0,0.1);

background:rgba(255,255,255,0.7);

outline:none;
font-size:14px;

transition:0.3s;

}

.input-group input:focus{

border:1px solid #3aa3ff;
box-shadow:0 0 6px rgba(58,163,255,0.3);

}

/* links */

.login-links{

display:flex;
justify-content:space-between;

font-size:13px;

margin-bottom:20px;

}

.login-links a{

text-decoration:none;
color:#3aa3ff;

}

/* botão */

.login-btn{

width:100%;
padding:12px;

border:none;
border-radius:10px;

background:linear-gradient(90deg,#3aa3ff,#2f8cff);

color:white;
font-size:16px;

cursor:pointer;

transition:0.3s;

}

.login-btn:hover{

transform:translateY(-2px);
box-shadow:0 6px 18px rgba(0,0,0,0.2);

}

/* texto inferior */

.footer-text{

margin-top:25px;
font-size:16px;
color:#2f8cff;

}

@media(max-width:480px){

.login-container{
width:90%;
}

}

</style>

</head>

<body>

<div id="tsparticles"></div>

<div class="login-container">

<h1>X Point</h1>

<div class="input-group">
<input type="text" placeholder="CPF">
</div>

<div class="input-group">
<input type="password" placeholder="Senha">
</div>

<div class="login-links">
<a href="#">Esqueceu a senha?</a>
<a href="#">Reconhecimento facial</a>
</div>

<button class="login-btn">Login</button>

<p class="footer-text">A jornada pode ser mais leve.</p>

</div>

<script>

tsParticles.load("tsparticles", {

fpsLimit: 60,

particles: {

number: {
value: 150,
density: {
enable: true,
area: 800
}
},

color: {
value: "#3aa3ff"
},

links: {
enable: true,
distance: 200,
color: "#3aa3ff",
opacity: 0.35,
width: 1
},

move: {
enable: true,
speed: 0.45,
direction: "none",
random: true,
straight: false,
outModes: {
default: "bounce"
}
},

size: {
value: 2
},

opacity: {
value: 0.6
}

},

interactivity: {

events: {
onHover: {
enable: true,
mode: "repulse"
}
},

modes: {

repulse: {
distance: 130,
duration: 1.4
}

}

},

detectRetina: true

});

</script>

</body>

</html>
