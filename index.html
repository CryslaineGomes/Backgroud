<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Background Neural</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
background:#eef6ff;
}

/* fundo */

#background{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
}

/* login */

.login{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

background:rgba(255,255,255,0.35);
backdrop-filter:blur(10px);

padding:40px;
border-radius:20px;

box-shadow:0 10px 40px rgba(0,0,0,0.15);

width:320px;
text-align:center;

}

.login h1{
margin-bottom:25px;
color:#2f8cff;
}

input{

width:100%;
padding:12px;
margin-bottom:15px;

border-radius:10px;
border:1px solid #ddd;

}

button{

width:100%;
padding:12px;

border:none;
border-radius:10px;

background:linear-gradient(90deg,#3aa3ff,#2f8cff);
color:white;

cursor:pointer;

}

</style>

</head>

<body>

<div id="background"></div>

<div class="login">

<h1>X Point</h1>

<input placeholder="CPF">
<input type="password" placeholder="Senha">

<button>Login</button>

</div>

<script>

VANTA.NET({

el: "#background",

mouseControls: true,
touchControls: true,

color: 0x3aa3ff,
backgroundColor: 0xeef6ff,

points: 10,
maxDistance: 22,
spacing: 18

})

</script>

</body>
</html>
